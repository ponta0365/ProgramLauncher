name: Build and Release Windows

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: x64

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build EXE
        shell: pwsh
        run: .\build_exe.ps1 -Clean

      - name: Create ZIP archive
        shell: pwsh
        run: |
          $zipPath = Join-Path $env:GITHUB_WORKSPACE 'ProgramLauncher_release.zip'
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }
          Compress-Archive -Path 'dist\ProgramLauncher\*' -DestinationPath $zipPath -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProgramLauncher-windows
          path: |
            ProgramLauncher_release.zip
            dist\ProgramLauncher\ProgramLauncher.exe

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ProgramLauncher_release.zip
            dist\ProgramLauncher\ProgramLauncher.exe
          body_path: .github/release-body.md
